name: Release

# One-click releases. Pick a semver bump from the Actions tab (or `gh workflow run`);
# CI computes the next version, builds eXLib.dll on Windows, tags, and publishes a
# GitHub Release with the DLL attached.
#
# Git tags are the version source of truth - there is no manifest to bump.
# Downstream (m2bot) consumes the published asset instead of building this itself.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Must be x86: build.ps1 links python27.lib and the game client is 32-bit.
      - name: Install 32-bit Python 2.7
        run: choco install python2 -y --forcex86 --params "/InstallDir:C:\Python27"

      - name: Compute version
        id: v
        shell: bash
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          [ -z "$latest" ] && latest="v0.0.0"
          IFS=. read -r major minor patch <<< "${latest#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          echo "version=v$major.$minor.$patch" >> "$GITHUB_OUTPUT"

      - name: Build eXLib.dll
        run: .\build.ps1

      - name: Tag and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.v.outputs.version }}"
          git push origin "${{ steps.v.outputs.version }}"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.version }}
          name: ${{ steps.v.outputs.version }}
          generate_release_notes: true
          files: build/eXLib.dll
